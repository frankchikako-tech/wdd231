<!-- Inside properties.html main tag -->
<main>
    <h2>Premium Real Estate Portfolio</h2>
    
    <!-- Client-Side Storage Interactive Control -->
    <div class="preference-bar">
        <button id="toggle-view-pref">Toggle Dark Mode Layout</button>
    </div>

    <!-- The Target Container for JS Insertion -->
    <div class="properties-container" id="properties-display-grid"></div>

    <!-- The Required Native Accessible Modal Dialog Structure -->
    <dialog id="property-detail-modal">
        <div class="modal-wrapper">
            <h2 id="modal-title">Property Title</h2>
            <p id="modal-specs" class="modal-highlight"></p>
            <p id="modal-desc">Detailed listing text goes here.</p>
            <button id="close-modal-btn">Close Details</button>
        </div>
    </dialog>
</main>
<script type="module" src="scripts/properties.js"></script>
