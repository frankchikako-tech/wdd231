<!-- Inside contact.html main tag -->
<main>
    <div class="form-container">
        <h2>Schedule a Property Consultation</h2>
        <form action="thank-you.html" method="get" id="consultation-form">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required placeholder="John Doe">

            <label for="emailAddress">Email Address</label>
            <input type="email" id="emailAddress" name="emailAddress" required placeholder="john@example.com">

            <label for="propertyType">Interested Property Category</label>
            <select id="propertyType" name="propertyType">
                <option value="Modern Duplex">Modern Duplex</option>
                <option value="Luxury Penthouse">Luxury Penthouse</option>
                <option value="Commercial Suite">Commercial Suite</option>
            </select>

            <label for="notes">Special Requests/Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Mention preferred viewing times..."></textarea>

            <button type="submit" id="submit-btn">Book Consultation Slot</button>
        </form>
    </div>
</main>
