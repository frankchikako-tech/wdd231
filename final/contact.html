<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baytahome | Book a Consultation Slot</title>
    <meta name="description" content="Connect directly with premium developers and register your interest in real estate assets without extra agent fees.">
    <meta name="author" content="Ukeje Frank Chika">
    
    <link rel="icon" href="images/favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <meta property="og:title" content="Baytahome | Book a Property Consultation Slot">
    <meta property="og:description" content="Connect directly with premium developers and register your interest in real estate assets without extra agent fees.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://frankchikako-tech.github.io/wdd231/final/contact.html">
    <meta property="og:image" content="https://frankchikako-tech.github.io/wdd231/images/profile.webp">
</head>
<body>
    <header>
        <span class="site-branding">Baytahome</span>
        <button id="menu-toggle" aria-label="Toggle navigation menu">☰</button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="properties.html">Properties</a></li>
                <li><a href="contact.html" class="active">Consultation</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-title-block">
            <h1>Schedule a Property Consultation</h1>
        </div>

        <div class="form-container">
            <h2>Submit Your Inquiry Parameters</h2>
            <form action="thank-you.html" method="get" id="consultation-form">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="John Doe">

                <label for="emailAddress">Email Address</label>
                <input type="email" id="emailAddress" name="emailAddress" required placeholder="john@example.com">

                <label for="propertyType">Interested Property Category</label>
                <select id="propertyType" name="propertyType">
                    <option value="Modern Duplex">Modern Duplex</option>
                    <option value="Luxury Penthouse">Luxury Penthouse</option>
                    <option value="Commercial Suite">Commercial Suite</option>
                </select>

                <label for="notes">Special Requests/Notes</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Mention preferred viewing times..."></textarea>

                <button type="submit" id="submit-btn">Book Consultation Slot</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Baytahome Project. Built for WDD 231 by Ukeje Frank Chika.</p>
        <p><a href="https://youtu.be/dQw4w9WgXcQ" target="_blank" class="video-link">🎬 Project Walkthrough Video</a></p>
    </footer>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
